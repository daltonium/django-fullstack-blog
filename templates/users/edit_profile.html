{% extends 'base.html' %}
{% block title %}Edit Profile — Inkwell{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card">
    <h1 class="form-title">Edit Profile</h1>
    <form method="post" class="auth-form">
      {% csrf_token %}
      {% for field in form %}
      <div class="field-group {% if field.errors %}field-group--error{% endif %}">
        <label class="field-label">{{ field.label }}</label>
        {{ field }}
        {% for err in field.errors %}<span class="field-error">{{ err }}</span>{% endfor %}
      </div>
      {% endfor %}
      <div class="form-actions mt-sm">
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'users:profile' username=request.user.username %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
