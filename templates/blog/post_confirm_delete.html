{% extends 'base.html' %}
{% block title %}Delete Post — Inkwell{% endblock %}
{% block content %}
<div class="form-page">
  <div class="form-card form-card--danger">
    <h1 class="form-title">Delete Post?</h1>
    <p>You're about to permanently delete <strong>{{ post.title }}</strong>. This cannot be undone.</p>
    <form method="post" class="form-actions mt-sm">
      {% csrf_token %}
      <button type="submit" class="btn btn-danger">Yes, Delete</button>
      <a href="{{ post.get_absolute_url }}" class="btn btn-ghost">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
